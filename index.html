      await dbPut('maintenanceItems', {
        id: uid(), propertyId: propId, ...it,
        deviceId: it.deviceId || null,
        nextDate: calcNextDate(it.lastDate, it.interval, it.intervalUnit),
        created: Date.now()
      });
    }

    // === Huoltohistoria (kirjattu jo tehdyt) ===
    // Etsi huoltokohteita ID:n perusteella seuraavalle vaiheelle
    const maintItems = await dbWhere('maintenanceItems', 'propertyId', propId);
    const findItem = (name) => maintItems.find(i => i.name === name);

    const ivItem = findItem('Ilmanvaihtosuodattimet');
    if (ivItem) {
      await dbPut('maintenanceLogs', { id: uid(), itemId: ivItem.id, date: '2025-09-15', what: 'Vaihdettu F7-suodatin, 2 kpl. Edellinen oli melko likainen.', by: 'Itse', photos: [], created: Date.now() });
      await dbPut('maintenanceLogs', { id: uid(), itemId: ivItem.id, date: '2025-03-20', what: 'Kevätvaihto. Suodattimet ostettu Motonetista.', by: 'Itse', photos: [], created: Date.now() });
    }
    const nuohousItem = findItem('Takan nuohous');
    if (nuohousItem) {
      await dbPut('maintenanceLogs', { id: uid(), itemId: nuohousItem.id, date: '2025-04-10', what: 'Vuosinuohous. Kaikki ok, ei ongelmia.', by: 'Mäkelä', photos: [], created: Date.now() });
    }
    const maaItem = findItem('Maalämpöpumpun vuosihuolto');
    if (maaItem) {
      await dbPut('maintenanceLogs', { id: uid(), itemId: maaItem.id, date: '2025-09-10', what: 'Vuosihuolto. Glykolin paine ok, suodattimet puhdistettu. Pumpun toiminta normaali.', by: 'NIBE-huolto', photos: [], created: Date.now() });
    }
    const terassiItem = findItem('Terassin öljyäminen');
    if (terassiItem) {
      await dbPut('maintenanceLogs', { id: uid(), itemId: terassiItem.id, date: '2024-06-01', what: 'Terassi pesty ja öljytty kahdesti. Valtti Terassiöljy, sävy ruskea.', by: 'Itse', photos: [], created: Date.now() });
    }
    const kivetItem = findItem('Kiukaan kivien vaihto');
    if (kivetItem) {
      await dbPut('maintenanceLogs', { id: uid(), itemId: kivetItem.id, date: '2024-06-15', what: 'Vanhat kivet ulos, uudet sisään (oliviinikivet, 20 kg). Tarkasta seuraavalla kerralla ohennettava.', by: 'Itse', photos: [], created: Date.now() });
    }

    // === Päiväkirjamerkinnät ===
    const journals = [
      { deviceId: apkId, date: '2026-04-12', title: 'Pumppu jumissa',
        text: 'Astianpesukone ei lähtenyt päälle aamulla. Suodatin oli täynnä ruoantähteitä — puhdistuksen jälkeen alkoi taas toimia normaalisti.\n\nMuistutus itselle: tarkista suodatin kuukausittain!' },
      { spaceId: pihaId, date: '2025-09-22', title: 'Syyssiivous',
        text: 'Lehdet haravoitu, sadevesikaivot puhdistettu. Etupiha kuntoon talvea varten. Käytetty noin 3 tuntia.' },
      { spaceId: paaId, date: '2025-11-08', title: 'Ulko-oven tiivisteet',
        text: 'Vaihdettu eteisen ulko-oven tiivisteet, vanhat olivat lähes umpeen kuluneet. Materiaali: D-profiili EPDM, 8m K-Raudasta. Vetää huomattavasti vähemmän.' },
      { spaceId: khId, date: '2025-09-15', title: 'Vesivahingon varalta',
        text: 'Asensin vesivahdin pesukoneen veden tuloputkeen. Hälyttää ja katkaisee veden jos vuotaa.\nLaite: Aquaguard AG-1, ostettu Verkkokauppa.com (89 €).' },
      { deviceId: kiuasId, date: '2025-08-20', title: 'Kivien tarkistus',
        text: 'Tarkastin saunan kivet, alkavat mennä rikki ja jauhautua. Vaihto seuraavana kesänä.' },
      { spaceId: olohuoneId, date: '2025-12-20', title: 'Verhotanko irti',
        text: 'Iso verhotanko olohuoneessa irrotettiin pesun ajaksi. Yksi kiinnike rikki — pitää käydä Bauhausista uusi.' },
      { deviceId: pesukoneId, date: '2025-11-15', title: 'Siivilän puhdistus',
        text: 'Puhdistettu pyykinpesukoneen pumpun suodatin. Siellä oli pari kolikkoa, vyön solki ja kasa nukkaa.' },
      { spaceId: autotalliId, date: '2025-10-30', title: 'Lumitykit valmiina',
        text: 'Lumilingosta vaihdettu öljyt ja terotettu lapa. Bensaa täyteen, valmis talvea varten.' },
      { spaceId: khpId, date: '2025-08-12', title: 'Saumat ok',
        text: 'Tarkastin kylpyhuoneen silikonisaumat suihkun ympärillä. Pieni tummuma kulmassa mutta ei vuotoa. Pitää huoltaa ehkä ensi vuonna.' },
      { deviceId: maalampoId, date: '2025-09-10', title: 'Vuosihuolto tehty',
        text: 'NIBE-huolto kävi tekemässä vuosihuollon. Kaikki ok, paineet normaalit. Lasku 285 €. Pyytänyt kuitin asiakirjoihin.' }
    ];
    for (const j of journals) {
      await dbPut('journalEntries', {
        id: uid(), propertyId: propId,
        spaceId: j.spaceId || null, deviceId: j.deviceId || null,
        date: j.date, title: j.title, text: j.text,
        photos: [], created: Date.now()
      });
    }
  }

  const ls = await dbGet('settings', 'lastProperty');
  const stillExists = ls && (await dbGet('properties', ls.value));
  if (stillExists) state.currentPropertyId = ls.value;
  else {
    const props = await dbAll('properties');
    if (props.length === 1) state.currentPropertyId = props[0].id;
  }

  render();
}

// Splash-näytön käsittely + päivityksen tarkistus
async function bootApp() {
  const splash = document.getElementById('splash');
  const status = document.getElementById('splashStatus');
  const app = document.getElementById('app');

  function showContinueBtn() {
    const btn = document.createElement('button');
    btn.textContent = 'Jatka';
    btn.style.cssText = 'margin-top:28px; padding:14px 48px; border-radius:14px; border:none; background:white; color:#2563eb; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.15);';
    btn.onclick = async () => {
      btn.disabled = true;
      await render();
      app.style.opacity = '1';
      splash.classList.add('fade-out');
      document.documentElement.style.background = '';
      document.querySelector('meta[name="theme-color"]').content = '#ffffff';
      setTimeout(() => { splash.style.display = 'none'; }, 500);
    };
    // Lisätään nappi ennen SVG-kuvitusta
    const art = document.querySelector('.splash-bottom-art');
    document.querySelector('.splash-content').insertBefore(btn, art);
  }

  try {
    status.textContent = 'Käynnistetään…';
    db = await openDB();
    const existingTaxonomies = await dbAll('taxonomies');
    if (existingTaxonomies.length === 0) {
      for (const [type, items] of Object.entries(DEFAULT_TAXONOMIES)) {
        for (let i = 0; i < items.length; i++) {
          await dbPut('taxonomies', { id: uid(), type, name: items[i].name, icon: items[i].icon, order: i, created: Date.now() });
        }
      }
    }
    await refreshTaxonomyCache();
    await loadAppSettings();
    const properties = await dbAll('properties');
    if (properties.length === 0) {
      const propId = uid();
      await dbPut('properties', { id: propId, name: 'Kotini', type: 'Omakotitalo', address: '', notes: '', created: Date.now() });
      state.currentPropertyId = propId;
      await dbPut('settings', { key: 'lastProperty', value: propId });
    } else {
      const ls = await dbGet('settings', 'lastProperty');
      state.currentPropertyId = ls?.value || properties[0].id;
    }

    // SW-päivitystarkistus
    if ('serviceWorker' in navigator) {
      try {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) {
          await Promise.race([reg.update(), new Promise(r => setTimeout(r, 2000))]);
          if (reg.waiting) {
            // Uusi versio odottaa — näytetään ilmoitus ja latauspainike
            status.textContent = `Uusi versio saatavilla`;
            status.style.color = 'rgba(255,255,255,0.95)';
            status.style.fontWeight = '600';

            const updateBtn = document.createElement('button');
            updateBtn.style.cssText = 'margin-top:16px; padding:12px 32px; border-radius:12px; border:2px solid white; background:transparent; color:white; font-size:15px; font-weight:600; cursor:pointer; display:block; width:100%; max-width:240px;';
            updateBtn.textContent = 'Lataa ja päivitä';
            updateBtn.onclick = () => {
              updateBtn.textContent = 'Päivitetään…';
              updateBtn.disabled = true;
              status.textContent = 'Ladataan uutta versiota…';
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            };
            // Lisätään nappi Jatka-napin eteen
            const art = document.querySelector('.splash-bottom-art');
            const content = document.querySelector('.splash-content');
            content.insertBefore(updateBtn, art);

            // Päivitetään sivu automaattisesti kun uusi SW ottaa kontrollin
            navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
          } else {
            status.textContent = `Uusin versio käytössä (${APP_VERSION})`;
          }
        } else {
          status.textContent = `Versio ${APP_VERSION}`;
        }
      } catch(e) {
        status.textContent = `Versio ${APP_VERSION}`;
      }
    } else {
      status.textContent = `Versio ${APP_VERSION}`;
    }
  } catch (err) {
    status.textContent = `Virhe: ${err.message}`;
    console.error('bootApp virhe:', err);
  }

  showContinueBtn();
}

bootApp();
</script>
