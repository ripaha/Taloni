<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Taloni</title>
<link rel="manifest" id="manifestLink">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%232563eb"/><path d="M50 24 L78 46 L78 78 L22 78 L22 46 Z" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  /* Light, airy palette */
  --bg: #ffffff;
  --bg-soft: #f5f7fa;
  --bg-card: #ffffff;

  --ink: #0f172a;
  --ink-soft: #64748b;
  --ink-faint: #94a3b8;

  --accent: #2563eb;        /* modern blue */
  --accent-dark: #1e40af;
  --accent-soft: #eff6ff;
  --accent-pale: #f5f9ff;

  --warm: #ea580c;          /* warm accent */
  --warm-soft: #ffedd5;

  --border: #e5e9f0;
  --border-soft: #eef2f5;

  --danger: #dc2626;
  --danger-soft: #fee2e2;
  --success: #16a34a;
  --success-soft: #dcfce7;
  --warn: #ea580c;
  --warn-soft: #ffedd5;

  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow: 0 1px 3px rgba(15, 23, 42, 0.04), 0 2px 8px rgba(15, 23, 42, 0.04);
  --shadow-lg: 0 4px 12px rgba(15, 23, 42, 0.06), 0 10px 30px rgba(15, 23, 42, 0.06);

  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior-y: none; }
html { background: #2563eb; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-soft);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

#app { max-width: 520px; margin: 0 auto; min-height: 100vh; padding-bottom: 96px; background: var(--bg-soft); transition: opacity 0.3s ease; }

/* --- Splash --- */
#splash {
  position: fixed; inset: 0;
  background: #2563eb;
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.4s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }
.splash-content {
  display: flex; flex-direction: column; align-items: center;
  gap: 18px;
  animation: splash-in 0.5s ease both;
}
@keyframes splash-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.splash-icon {
  width: 110px; height: 110px;
  filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.15));
}
.splash-title {
  font-family: 'Inter', sans-serif;
  font-size: 38px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.03em;
}
.splash-status {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.75);
  font-weight: 500;
  margin-top: 6px;
  min-height: 18px;
}

/* --- Top bar (kevyt, ei iso hero) --- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  padding-top: max(14px, env(safe-area-inset-top));
  background: var(--bg);
  border-bottom: 1px solid var(--border-soft);
  position: sticky; top: 0; z-index: 30;
}
.brand {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--ink);
  letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px;
}
.brand-mark {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  color: white;
  border-radius: 8px; display: flex;
  align-items: center; justify-content: center;
}
.brand-mark svg { width: 16px; height: 16px; }
.brand-version {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-faint);
  letter-spacing: 0;
  align-self: center;
  margin-left: 2px;
}

.prop-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent-soft); color: var(--accent-dark);
  padding: 7px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  border: 1px solid transparent; cursor: pointer; font-family: inherit;
  max-width: 50%;
}
.prop-pill .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prop-pill svg { width: 14px; height: 14px; flex-shrink: 0; }
.prop-pill:active { background: #dceaff; }

/* --- Back nav --- */
.back-nav {
  display: flex; align-items: center; gap: 6px;
  padding: 14px 20px 4px;
  cursor: pointer;
  color: var(--accent);
  font-size: 15px; font-weight: 500;
}
.back-nav svg { width: 20px; height: 20px; }

.content { padding: 16px 20px 20px; }

/* --- Headings --- */
.page-title {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1.2;
}
.page-subtitle {
  font-size: 14px; color: var(--ink-soft); margin-bottom: 24px;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin: 28px 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.section-title:first-child { margin-top: 0; }
.section-title .action {
  font-size: 14px; font-weight: 600; color: var(--accent);
  cursor: pointer; display: flex; align-items: center; gap: 4px;
}
.section-title .action svg { width: 16px; height: 16px; }

/* --- Stats (compact) --- */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.stat {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.stat-num {
  font-family: 'Inter', sans-serif;
  font-size: 20px; font-weight: 600; line-height: 1;
  color: var(--ink);
}
.stat-num.warn { color: var(--warn); }
.stat-num.danger { color: var(--danger); }
.stat-num.ok { color: var(--accent); }
.stat-label {
  font-size: 12px; color: var(--ink-soft);
  font-weight: 500;
}

/* --- Cards (D-style: neutral, grouped) --- */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 6px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.12s ease;
  border: 1px solid var(--border-soft);
}
.card:active { transform: scale(0.99); }

.card-row { display: flex; align-items: center; gap: 12px; }
.card-icon {
  width: 34px; height: 34px;
  background: var(--bg-soft); color: var(--ink-soft);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-icon svg { width: 17px; height: 17px; }

.card-main { flex: 1; min-width: 0; }
.card-title {
  font-weight: 600; font-size: 15px; color: var(--ink);
  word-break: break-word; line-height: 1.3;
}

.card-date {
  font-size: 12.5px;
  color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Group titles (Myöhässä, Tulossa) */
.group-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: 22px 0 10px;
  color: var(--ink-soft);
}
.group-title:first-child { margin-top: 8px; }
.group-title.urgent { color: var(--danger); }
.group-title.soon { color: var(--warn); }

/* --- Badge --- */
.badge {
  font-size: 12px; font-weight: 600;
  padding: 4px 10px; border-radius: 100px;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
}
.badge.danger { background: var(--danger-soft); color: var(--danger); }
.badge.warn { background: var(--warn-soft); color: var(--warn); }
.badge.ok { background: var(--success-soft); color: var(--success); }
.badge.neutral { background: var(--bg-soft); color: var(--ink-soft); }

/* --- Empty states --- */
.empty {
  text-align: center; padding: 40px 24px;
  color: var(--ink-soft);
}
.empty-icon-circle {
  width: 64px; height: 64px;
  background: var(--accent-pale); color: var(--accent);
  border-radius: 50%; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
}
.empty-icon-circle svg { width: 32px; height: 32px; }
.empty-title {
  font-family: 'Inter', sans-serif;
  font-size: 20px; font-weight: 600;
  color: var(--ink); margin-bottom: 6px;
}
.empty-text { font-size: 14px; max-width: 280px; margin: 0 auto; }
.empty-action { margin-top: 20px; }

/* --- FAB --- */
.fab {
  position: fixed;
  right: max(20px, calc(50% - 240px));
  bottom: calc(86px + env(safe-area-inset-bottom));
  width: 56px; height: 56px;
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  color: white;
  border: none; border-radius: 16px;
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
  cursor: pointer; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s ease;
}
.fab:active { transform: scale(0.92); }
.fab svg { width: 24px; height: 24px; }

/* --- Bottom nav --- */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-top: 1px solid var(--border-soft);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 40;
}
.nav-inner {
  max-width: 520px; margin: 0 auto; width: 100%;
  display: grid; grid-template-columns: repeat(4, 1fr);
}
.nav-btn {
  background: none; border: none;
  padding: 12px 4px 10px;
  color: var(--ink-soft);
  font-size: 11px; font-weight: 500;
  font-family: inherit;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  cursor: pointer; position: relative;
}
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active svg { stroke-width: 2.4; }

/* --- Modal --- */
.modal {
  position: fixed; inset: 0;
  background: rgba(20, 40, 32, 0.4);
  z-index: 100;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(6px);
}
.modal.active { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-sheet {
  background: var(--bg);
  width: 100%; max-width: 520px; margin: 0 auto;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 10px 22px 28px;
  padding-bottom: calc(28px + env(safe-area-inset-bottom));
  max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.25s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle {
  width: 40px; height: 4px; background: var(--border); border-radius: 2px;
  margin: 0 auto 20px;
}
.modal-title {
  font-family: 'Inter', sans-serif;
  font-size: 22px; font-weight: 700;
  margin-bottom: 6px; letter-spacing: -0.02em;
}
.modal-subtitle {
  font-size: 14px; color: var(--ink-soft);
  margin-bottom: 24px;
}

/* --- Forms --- */
.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--ink); margin-bottom: 8px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 16px; font-family: inherit;
  background: var(--bg); color: var(--ink);
  transition: border-color 0.15s ease;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--accent);
}
.field textarea { resize: vertical; min-height: 90px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-help { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }

/* --- Buttons --- */
.btn {
  padding: 15px 22px; border: none;
  border-radius: 12px;
  font-size: 16px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: transform 0.1s ease, background 0.15s ease;
  display: inline-flex; align-items: center;
  justify-content: center; gap: 8px;
  min-height: 50px;
}
.btn:active { transform: scale(0.98); }
.btn svg { width: 18px; height: 18px; }
.btn-primary { background: var(--accent); color: white; width: 100%; }
.btn-primary:active { background: var(--accent-dark); }
.btn-secondary { background: var(--accent-soft); color: var(--accent-dark); width: 100%; }
.btn-ghost { background: transparent; color: var(--ink-soft); }
.btn-danger { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); width: 100%; }
.btn-row { display: flex; gap: 10px; margin-top: 10px; }
.btn-row .btn { flex: 1; }

/* --- List item --- */
.list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.1s;
  min-height: 64px;
}
.list-item:active { transform: scale(0.99); }
.list-item .icon-wrap {
  width: 40px; height: 40px;
  background: var(--accent-pale); color: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.list-item .icon-wrap svg { width: 20px; height: 20px; }
.list-item .text { flex: 1; min-width: 0; }
.list-item .text .name { font-weight: 600; font-size: 15px; }
.list-item .text .sub { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
.list-item .arrow { color: var(--ink-faint); }
.list-item .arrow svg { width: 18px; height: 18px; }

/* --- Property selector hero (only on property picker) --- */
.property-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.12s;
  position: relative;
  overflow: hidden;
  border: 1.5px solid transparent;
}
.property-card:active { transform: scale(0.99); }
.property-card::before {
  content: ''; position: absolute; right: -30px; top: -30px;
  width: 120px; height: 120px; border-radius: 50%;
  background: var(--accent-pale);
}
.property-card-content { position: relative; }
.property-card h3 {
  font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700;
  margin-bottom: 4px; color: var(--ink); letter-spacing: -0.02em;
}
.property-card .meta { font-size: 14px; color: var(--ink-soft); }

.property-add-card {
  border: 2px dashed var(--border);
  background: transparent;
  border-radius: var(--radius); padding: 24px;
  text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  color: var(--ink-soft); font-weight: 600;
}
.property-add-card:active { border-color: var(--accent); background: var(--accent-pale); }
.property-add-card svg { width: 20px; height: 20px; }

/* --- Setting row --- */
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 18px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  min-height: 60px;
}
.setting-row .label { font-weight: 500; font-size: 15px; }
.setting-row .value { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
.setting-row .arrow svg { width: 18px; height: 18px; color: var(--ink-faint); }

/* --- Toast --- */
.toast {
  position: fixed; bottom: 110px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink); color: white;
  padding: 12px 20px; border-radius: 100px;
  font-size: 14px; font-weight: 500;
  z-index: 200; opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
  white-space: nowrap; max-width: 92vw; text-align: center;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; }

/* --- Update banner --- */
.update-banner {
  position: fixed;
  top: max(12px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: white;
  padding: 10px 14px 10px 18px;
  border-radius: 100px;
  display: flex; align-items: center; gap: 10px;
  z-index: 300;
  box-shadow: 0 6px 20px rgba(45, 106, 79, 0.4);
  animation: slideDown 0.3s ease;
  max-width: 92vw;
}
@keyframes slideDown {
  from { transform: translate(-50%, -100%); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}
.update-banner-text { font-size: 14px; font-weight: 500; white-space: nowrap; }
.update-banner-btn {
  background: white; color: var(--accent);
  border: none; padding: 6px 14px; border-radius: 100px;
  font-weight: 700; font-size: 13px; font-family: inherit;
  cursor: pointer;
}
.update-banner-close {
  background: transparent; color: white; border: none;
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0;
}
.update-banner-close svg { width: 16px; height: 16px; }

/* --- Photo grid --- */
.photo-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;
}
.photo-thumb {
  aspect-ratio: 1; background: var(--bg-soft);
  border-radius: 10px; overflow: hidden;
  position: relative; cursor: pointer;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .remove {
  position: absolute; top: 5px; right: 5px;
  width: 24px; height: 24px;
  background: rgba(20, 20, 20, 0.7); color: white;
  border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
}
.photo-thumb .remove svg { width: 14px; height: 14px; }
.photo-add {
  aspect-ratio: 1; border: 2px dashed var(--border);
  border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--ink-faint); cursor: pointer; background: transparent;
  gap: 4px;
}
.photo-add svg { width: 24px; height: 24px; }
.photo-add .label { font-size: 10px; font-weight: 500; }

/* --- Detail hero --- */
.detail-hero {
  background: linear-gradient(135deg, var(--accent-pale) 0%, var(--accent-soft) 100%);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 18px;
}
.detail-hero-top {
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 14px; margin-bottom: 4px;
}
.detail-hero h2 {
  font-family: 'Inter', sans-serif;
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.02em; line-height: 1.25;
  word-break: break-word;
}
.detail-hero .sub {
  font-size: 14px; color: var(--ink-soft); margin-top: 4px;
  display: flex; align-items: center; gap: 6px;
}
.detail-hero .sub svg { width: 14px; height: 14px; }

.detail-meta-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  margin-top: 18px; padding-top: 18px;
  border-top: 1px solid rgba(45, 106, 79, 0.15);
}
.detail-meta-item .label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--ink-soft);
  font-weight: 600;
}
.detail-meta-item .value {
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 600; margin-top: 3px;
  letter-spacing: -0.01em;
}

/* --- Doc card --- */
.doc-icon-wrap {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--accent-soft); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
  flex-shrink: 0; letter-spacing: 0.02em;
}
.doc-icon-wrap.pdf { background: var(--warm-soft); color: var(--warm); }
.doc-icon-wrap.img { background: var(--success-soft); color: var(--success); }
.doc-icon-wrap.file { background: var(--bg-soft); color: var(--ink-soft); }

/* --- History --- */
.history-item {
  padding: 14px 0; display: flex; gap: 14px;
  border-bottom: 1px solid var(--border-soft);
}
.history-item:last-child { border-bottom: none; }
.history-date {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: var(--ink-soft); min-width: 56px; font-weight: 500;
  text-align: right; padding-top: 2px;

// Service Worker rekisteröinti
let swRegistration = null;
let updateAvailable = false;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      swRegistration = await navigator.serviceWorker.register('./sw.js');
      console.log('[App] Service worker rekisteröity');

      // Tarkista päivitykset heti
      swRegistration.update();

      // Tarkista päivitykset säännöllisesti taustalla (joka 30min)
      setInterval(() => swRegistration.update(), 30 * 60 * 1000);

      // Kuuntele uutta service workeria
      swRegistration.addEventListener('updatefound', () => {
        const newWorker = swRegistration.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Uusi versio on saatavilla
            updateAvailable = true;
            showUpdateBanner();
          }
        });
      });

      // Kun service worker vaihtuu, päivitä sivu
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    } catch (err) {
      console.error('[App] Service worker virhe:', err);
    }
  });
}

function applyUpdate() {

    window.location.reload();

  // Käske odottavan service workerin aktivoitumaan

// ============================================================
// IndexedDB
// ============================================================
const DB_NAME = 'taloni';
const DB_VERSION = 2;
let db = null;

const STORES = ['properties', 'spaces', 'devices', 'maintenanceItems', 'maintenanceLogs',
                'journalEntries', 'projects', 'documents', 'contacts', 'meters', 'meterReadings',
                'taxonomies', 'settings'];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('properties')) db.createObjectStore('properties', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('spaces')) {
        const s = db.createObjectStore('spaces', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('parentId', 'parentId');
      }
      if (!db.objectStoreNames.contains('devices')) {
        const s = db.createObjectStore('devices', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('spaceId', 'spaceId');
      }
      if (!db.objectStoreNames.contains('maintenanceItems')) {
        const s = db.createObjectStore('maintenanceItems', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('spaceId', 'spaceId');
        s.createIndex('deviceId', 'deviceId'); s.createIndex('nextDate', 'nextDate');
      }
      if (!db.objectStoreNames.contains('maintenanceLogs')) {
        const s = db.createObjectStore('maintenanceLogs', { keyPath: 'id' });
        s.createIndex('itemId', 'itemId'); s.createIndex('deviceId', 'deviceId');
      }
      if (!db.objectStoreNames.contains('journalEntries')) {
        const s = db.createObjectStore('journalEntries', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('spaceId', 'spaceId');
        s.createIndex('projectId', 'projectId');
      }
      if (!db.objectStoreNames.contains('projects')) {
        const s = db.createObjectStore('projects', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId');
      }
      if (!db.objectStoreNames.contains('documents')) {
        const s = db.createObjectStore('documents', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('spaceId', 'spaceId');
        s.createIndex('deviceId', 'deviceId');
      }
      if (!db.objectStoreNames.contains('contacts')) {
        const s = db.createObjectStore('contacts', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId');
      }
      if (!db.objectStoreNames.contains('meters')) {
        const s = db.createObjectStore('meters', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId');
      }
      if (!db.objectStoreNames.contains('meterReadings')) {
        const s = db.createObjectStore('meterReadings', { keyPath: 'id' });
        s.createIndex('meterId', 'meterId');
      }
      if (!db.objectStoreNames.contains('taxonomies')) {
        const s = db.createObjectStore('taxonomies', { keyPath: 'id' });
        s.createIndex('type', 'type');
      }
      if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const tx = (s, m='readonly') => db.transaction(s, m).objectStore(s);
const dbPut = (s, o) => new Promise((r, j) => { o.updated = Date.now(); const x = tx(s,'readwrite').put(o); x.onsuccess = () => r(o); x.onerror = () => j(x.error); });
const dbGet = (s, k) => new Promise((r, j) => { const x = tx(s).get(k); x.onsuccess = () => r(x.result); x.onerror = () => j(x.error); });
const dbAll = (s) => new Promise((r, j) => { const x = tx(s).getAll(); x.onsuccess = () => r(x.result); x.onerror = () => j(x.error); });
const dbDel = (s, k) => new Promise((r, j) => { const x = tx(s,'readwrite').delete(k); x.onsuccess = () => r(); x.onerror = () => j(x.error); });
const dbClear = (s) => new Promise((r, j) => { const x = tx(s,'readwrite').clear(); x.onsuccess = () => r(); x.onerror = () => j(x.error); });
async function dbWhere(store, indexName, value) {
  return new Promise((res, rej) => {
    const r = tx(store).index(indexName).getAll(value);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const today = () => new Date().toISOString().slice(0, 10);
const fmtDate = iso => !iso ? '–' : new Date(iso).toLocaleDateString('fi-FI', { day: 'numeric', month: 'short', year: 'numeric' });
const fmtDateShort = iso => !iso ? '–' : new Date(iso).toLocaleDateString('fi-FI', { day: 'numeric', month: 'numeric' });
const fmtSize = b => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' kB' : (b/1048576).toFixed(1) + ' MB';
function daysUntil(iso) {
  if (!iso) return null;
  const d = new Date(iso); d.setHours(0,0,0,0);
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}
function calcNextDate(lastDate, interval, unit) {
  if (!lastDate || !interval) return null;
  const d = new Date(lastDate);
  if (unit === 'days') d.setDate(d.getDate() + Number(interval));
  if (unit === 'months') d.setMonth(d.getMonth() + Number(interval));
  if (unit === 'years') d.setFullYear(d.getFullYear() + Number(interval));
  return d.toISOString().slice(0, 10);
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
const escapeHtml = s => s == null ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function compressImage(file, maxWidth = 1600, quality = 0.82) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => {
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale; canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Haetaan luokitukset (tyyppi: 'spaceType' tai 'maintenanceCategory')
async function getTaxonomy(type) {
  const all = await dbAll('taxonomies');
  return all.filter(t => t.type === type).sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
}

// Pikahaku ikonille luokitusnimen perusteella
async function getTaxonomyIcon(type, name) {
  const list = await getTaxonomy(type);
  const found = list.find(t => t.name === name);
  return found?.icon || (type === 'maintenanceCategory' ? 'wrench' : 'square');
}

// Synkrooninen versio: ikoni-cache jota täytetään render-ajossa
let taxonomyIconCache = { spaceType: {}, maintenanceCategory: {} };
async function refreshTaxonomyCache() {
  const spaceTypes = await getTaxonomy('spaceType');
  const categories = await getTaxonomy('maintenanceCategory');
  taxonomyIconCache.spaceType = Object.fromEntries(spaceTypes.map(t => [t.name, t.icon]));
  taxonomyIconCache.maintenanceCategory = Object.fromEntries(categories.map(t => [t.name, t.icon]));
}
function spaceIcon(name) { return taxonomyIconCache.spaceType[name] || 'square'; }
function categoryIcon(name) { return taxonomyIconCache.maintenanceCategory[name] || 'wrench'; }

// Pieni apuri Lucide-ikonin renderöimiseen HTML-merkkijonona
function icon(name, size) {

  return `<i data-lucide="${name}"${size ? ` style="width:${size}px;height:${size}px"` : ''}></i>`;
}

}

let state = {

  currentTab: 'home',
  stack: [],

  upcomingDays: 30  // päivissä — luetaan asetuksista, oletus 30

async function loadAppSettings() {
  const s = await dbGet('settings', 'upcomingDays');
  if (s && typeof s.value === 'number') state.upcomingDays = s.value;
}

function pushView(view) { state.stack.push(view); render(); window.scrollTo(0, 0); }
function popView() { state.stack.pop(); render(); window.scrollTo(0, 0); }
function clearStack() { state.stack = []; }

// Render
// ============================================================
async function render() {
  await renderTopbar();
  await renderBackNav();
  await renderNav();
  await renderContent();
  refreshIcons();
}

async function renderTopbar() {
  const el = document.getElementById('topbar');
  const properties = await dbAll('properties');
  const current = state.currentPropertyId ? properties.find(p => p.id === state.currentPropertyId) : null;

  el.innerHTML = `
    <div class="brand">
      <div class="brand-mark">${icon('home')}</div>
      <span>Taloni</span>
      <span class="brand-version">v${APP_VERSION}</span>
    </div>
    ${current ? `
      <button class="prop-pill" onclick="openPropertyPicker()">
        <span class="name">${escapeHtml(current.name)}</span>
        ${properties.length > 1 ? icon('chevrons-up-down') : ''}
      </button>
    ` : ''}`;
}

async function renderBackNav() {
  const el = document.getElementById('backNav');
  if (state.stack.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="back-nav" onclick="popView()">${icon('arrow-left')}Takaisin</div>`;
}

async function renderNav() {
  const nav = document.getElementById('nav');
  if (!state.currentPropertyId) { nav.innerHTML = ''; return; }
  const tabs = [
    { id: 'home', label: 'Etusivu', icon: 'house' },
    { id: 'spaces', label: 'Tilat', icon: 'layout-grid' },
    { id: 'journal', label: 'Päiväkirja', icon: 'book-open' },
    { id: 'more', label: 'Lisää', icon: 'menu' }
  ];
  nav.innerHTML = `<div class="nav-inner">${tabs.map(t => `
    <button class="nav-btn ${state.currentTab === t.id && state.stack.length === 0 ? 'active' : ''}" onclick="switchTab('${t.id}')">
      ${icon(t.icon)}<span>${t.label}</span>
    </button>`).join('')}</div>`;
}

function switchTab(tab) {
  state.currentTab = tab;
  clearStack();
  render();
  window.scrollTo(0, 0);
}

async function renderContent() {
  document.getElementById('fab').style.display = 'none';
  if (!state.currentPropertyId) return renderPropertyPicker();
  if (state.stack.length > 0) {
    const top = state.stack[state.stack.length - 1];
    if (top.view === 'space') return renderSpaceView(top.id);
    if (top.view === 'maintenanceList') return renderMaintenanceList();
    if (top.view === 'documentsList') return renderDocumentsList();
    if (top.view === 'devicesList') return renderDevicesList();
    if (top.view === 'contactsList') return renderContactsList();
    if (top.view === 'maintenanceItem') return renderMaintenanceItemDetail(top.id);
    if (top.view === 'device') return renderDeviceDetail(top.id);
    if (top.view === 'document') return renderDocumentDetail(top.id);
    if (top.view === 'taxonomies') return renderTaxonomyList();
    if (top.view === 'taxonomyEdit') return renderTaxonomyEdit(top.type);
    if (top.view === 'changelog') return renderChangelog();
    if (top.view === 'journalList') return renderJournalList(top);
    if (top.view === 'gallery') return renderGallery(top);
  }
  if (state.currentTab === 'home') return renderHome();
  if (state.currentTab === 'spaces') return renderSpaces();
  if (state.currentTab === 'journal') return renderJournal();
  if (state.currentTab === 'more') return renderMore();
}

  return `<div class="card" onclick="pushView({view:'maintenanceItem', id:'${item.id}'})">

function getDescendantSpaceIds(spaceId, allSpaces) {
  const ids = [spaceId];
  const queue = [spaceId];
  while (queue.length > 0) {
    const current = queue.shift();
    for (const s of allSpaces) {
      if (s.parentId === current && !ids.includes(s.id)) {
        ids.push(s.id);
        queue.push(s.id);
      }
    }
  }
  return ids;
}

async function collectGalleryPhotos(opts) {
  const photos = [];
  let journals, galleryDocs;
  if (opts.spaceId) {
    const allSpaces = await dbWhere('spaces', 'propertyId', state.currentPropertyId);
    const spaceIds = opts.includeChildren !== false ? getDescendantSpaceIds(opts.spaceId, allSpaces) : [opts.spaceId];
    journals = []; galleryDocs = [];
    for (const sid of spaceIds) {
      journals.push(...await dbWhere('journalEntries', 'spaceId', sid));
      galleryDocs.push(...(await dbWhere('documents', 'spaceId', sid)).filter(d => d.category === 'galleria'));
    }
  } else if (opts.deviceId) {
    journals = (await dbAll('journalEntries')).filter(j => j.deviceId === opts.deviceId);
    galleryDocs = (await dbWhere('documents', 'deviceId', opts.deviceId)).filter(d => d.category === 'galleria');
  } else {
    journals = await dbWhere('journalEntries', 'propertyId', state.currentPropertyId);
    galleryDocs = (await dbWhere('documents', 'propertyId', state.currentPropertyId)).filter(d => d.category === 'galleria');
  }
  journals.sort((a, b) => b.date.localeCompare(a.date));
  galleryDocs.sort((a, b) => (b.created || 0) - (a.created || 0));
  for (const e of journals) { if (e.photos) { for (const p of e.photos) photos.push({ blob: p, source: 'journal', entry: e }); } }
  for (const d of galleryDocs) { if (d.blob) photos.push({ blob: d.blob, source: 'gallery', doc: d }); }
  return photos;
}

function renderGalleryPreview(photos, spaceId, deviceId) {
  const inputId = 'galInline_' + (spaceId || deviceId || 'x');
  return `<div class="photo-grid" style="grid-template-columns: repeat(4, 1fr);">
    ${photos.slice(0, 6).map(p => `<div class="photo-thumb"><img src="${URL.createObjectURL(p.blob)}"></div>`).join('')}
    <button class="photo-add" onclick="document.getElementById('${inputId}_cam').click()">${icon('camera')}<span class="label">Ota kuva kameralla</span></button>
    <button class="photo-add" onclick="document.getElementById('${inputId}_gal').click()">${icon('image')}<span class="label">Lisää galleriasta</span></button>
    <input type="file" id="${inputId}_cam" accept="image/*" capture="environment" style="display:none" onchange="saveInlineGalleryPhotos(event, '${spaceId || ''}', '${deviceId || ''}')">
    <input type="file" id="${inputId}_gal" accept="image/*" style="display:none" multiple onchange="saveInlineGalleryPhotos(event, '${spaceId || ''}', '${deviceId || ''}')">
  </div>`;
}

async function saveInlineGalleryPhotos(event, spaceId, deviceId) {
  const files = Array.from(event.target.files);
  if (files.length === 0) return;
  toast('Tallennetaan…');
  for (const f of files) {
    const photo = await compressImage(f);
    await dbPut('documents', {
      id: uid(), propertyId: state.currentPropertyId,
      spaceId: spaceId || null, deviceId: deviceId || null,
      title: 'Valokuva', category: 'galleria',
      notes: '', fileName: 'kuva.jpg', mimeType: photo.type || 'image/jpeg',
      size: photo.size, blob: photo, created: Date.now()

  event.target.value = '';

async function buildBreadcrumbs(space) {
  const property = await dbGet('properties', space.propertyId);
  const crumbs = [escapeHtml(property?.name || 'Kiinteistö')];
  let current = space;
  const chain = [];
  while (current.parentId) {
    const parent = await dbGet('spaces', current.parentId);
    if (!parent) break;
    chain.unshift(parent);
    current = parent;
  }
  chain.forEach(s => crumbs.push(escapeHtml(s.name)));
  crumbs.push(escapeHtml(space.name));
  return crumbs;
}

  const soon = items.filter(i => { const d = daysUntil(i.nextDate); return d !== null && d >= 0 && d <= state.upcomingDays; });

  return `<div class="card" onclick="pushView({view:'document', id:'${d.id}'})">
    <div class="card-row">
      <div class="doc-icon-wrap ${iconCls}">${ext}</div>
      <div class="card-main">

        <div class="card-meta"><span>${escapeHtml(d.category)}</span><span class="dot">·</span><span>${fmtSize(d.size)}</span></div>

async function openDoc(id) {
  const d = await dbGet('documents', id);
  window.open(URL.createObjectURL(d.blob), '_blank');

async function downloadDoc(id) {
  const d = await dbGet('documents', id);
  const url = URL.createObjectURL(d.blob);
  const a = document.createElement('a');
  a.href = url; a.download = d.fileName || 'tiedosto'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
async function deleteDoc(id) {
  if (!confirm('Poistetaanko asiakirja?')) return;
  await dbDel('documents', id);
  popView();
  toast('Poistettu');
}

async function moveTaxonomy(type, id, direction) {
  const items = await getTaxonomy(type);
  const idx = items.findIndex(i => i.id === id);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= items.length) return;
  // Vaihda paikkoja ja päivitä order-arvot
  [items[idx], items[newIdx]] = [items[newIdx], items[idx]];
  for (let i = 0; i < items.length; i++) {
    items[i].order = i;
    await dbPut('taxonomies', items[i]);
  }
  await refreshTaxonomyCache();
  render();
}

let selectedIcon = null;
function selectIcon(name) {
  selectedIcon = name;
  document.querySelectorAll('#iconPicker .icon-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.icon === name);
  });

async function saveTaxonomy(type, id) {
  const name = document.getElementById('taxName').value.trim();
  if (!name) { toast('Anna nimi'); return; }
  const selected = document.querySelector('#iconPicker .icon-option.selected');
  const iconName = selected ? selected.dataset.icon : 'square';

  if (id) {
    const item = await dbGet('taxonomies', id);
    const oldName = item.name;
    item.name = name;
    item.icon = iconName;
    await dbPut('taxonomies', item);
    // Jos nimi muuttui, päivitä viittaukset
    if (oldName !== name) await renameTaxonomyUsages(type, oldName, name);
  } else {
    const existing = await getTaxonomy(type);
    await dbPut('taxonomies', {
      id: uid(), type, name, icon: iconName,
      order: existing.length, created: Date.now()
    });
  }
  await refreshTaxonomyCache();
  closeModal();
  toast('Tallennettu');
  render();
}

async function renameTaxonomyUsages(type, oldName, newName) {
  if (type === 'spaceType') {
    const spaces = await dbAll('spaces');
    for (const s of spaces) {
      if (s.type === oldName) { s.type = newName; await dbPut('spaces', s); }
    }
  } else if (type === 'maintenanceCategory') {
    const items = await dbAll('maintenanceItems');
    for (const it of items) {
      if (it.category === oldName) { it.category = newName; await dbPut('maintenanceItems', it); }
    }
  }
}

async function deleteTaxonomy(type, id, name) {
  // Tarkista käyttömäärä
  let usage = 0;
  let fallbackOptions = [];
  if (type === 'spaceType') {
    const spaces = await dbAll('spaces');
    usage = spaces.filter(s => s.type === name).length;
    fallbackOptions = (await getTaxonomy(type)).filter(t => t.id !== id);
  } else {
    const items = await dbAll('maintenanceItems');
    usage = items.filter(i => i.category === name).length;
    fallbackOptions = (await getTaxonomy(type)).filter(t => t.id !== id);
  }

  if (usage === 0) {
    if (!confirm(`Poistetaanko "${name}"?`)) return;
    await dbDel('taxonomies', id);
    await refreshTaxonomyCache();
    closeModal();
    toast('Poistettu');
    render();
    return;
  }

  // Jos käytössä, kysy mihin siirretään
  const fallbackList = fallbackOptions.map(t => `<option value="${escapeHtml(t.name)}">${escapeHtml(t.name)}</option>`).join('');
  openModal(`
    <div class="modal-title">Poista "${escapeHtml(name)}"?</div>
    <div class="modal-subtitle">Tällä luokituksella on ${usage} käyttökohdetta. Mihin ne siirretään?</div>
    <div class="field"><label>Siirrä kohteeseen</label>
      <select id="fallbackTo">
        <option value="">— Tyhjä (poista luokitus) —</option>
        ${fallbackList}
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Peruuta</button>
      <button class="btn btn-danger" onclick="confirmDeleteTaxonomy('${type}', '${id}', '${escapeHtml(name)}')">Poista</button>
    </div>
  `);
}

async function confirmDeleteTaxonomy(type, id, name) {
  const fallback = document.getElementById('fallbackTo').value || null;
  // Päivitä viittaukset
  if (type === 'spaceType') {
    const spaces = await dbAll('spaces');
    for (const s of spaces) {
      if (s.type === name) { s.type = fallback; await dbPut('spaces', s); }
    }
  } else {
    const items = await dbAll('maintenanceItems');
    for (const it of items) {
      if (it.category === name) { it.category = fallback || 'Muu'; await dbPut('maintenanceItems', it); }
    }
  }
  await dbDel('taxonomies', id);
  await refreshTaxonomyCache();
  closeModal();
  toast('Poistettu');
  render();
}

  if (!confirm('Poistetaanko tila? Alatilat poistuvat myös. Tiloihin liitetyt huollot/asiakirjat säilyvät mutta menettävät tilan.')) return;
  const allSpaces = await dbWhere('spaces', 'propertyId', state.currentPropertyId);
  const toDelete = [id];
  let i = 0;
  while (i < toDelete.length) {
    const children = allSpaces.filter(s => s.parentId === toDelete[i]);
    children.forEach(c => toDelete.push(c.id));
    i++;
  }
  for (const sid of toDelete) {
    for (const store of ['devices', 'maintenanceItems', 'journalEntries', 'documents']) {
      const items = await dbWhere(store, 'spaceId', sid);
      for (const it of items) { it.spaceId = null; await dbPut(store, it); }
    }
    await dbDel('spaces', sid);
  }
  popView();
  toast('Tila poistettu');
}

async function onDocFileSelected() {
  const file = document.getElementById('docFile').files[0];
  if (!file) return;
  state.formDocFile = file;
  if (file.type.startsWith('image/')) {
    const compressed = await compressImage(file, 2000, 0.85);
    state.formDocFile = compressed;
    state.formDocFile.name = file.name;
  }
  document.getElementById('docFileInfo').textContent = `${file.name} (${fmtSize(state.formDocFile.size || file.size)})`;
  if (!document.getElementById('docTitle').value) {
    document.getElementById('docTitle').value = file.name.replace(/\.[^.]+$/, '');
  }
}

async function saveNewDoc() {
  if (!state.formDocFile) { toast('Valitse tiedosto'); return; }
  const title = document.getElementById('docTitle').value.trim();
  if (!title) { toast('Anna otsikko'); return; }
  const fileName = state.formDocFile.name || document.getElementById('docFile').files[0]?.name || 'tiedosto';
  const linkValue = document.getElementById('docLink').value;
  let spaceId = null, deviceId = null;
  if (linkValue.startsWith('space:')) spaceId = linkValue.slice(6);
  else if (linkValue.startsWith('device:')) deviceId = linkValue.slice(7);
  const doc = {
    id: uid(), propertyId: state.currentPropertyId,
    spaceId, deviceId,
    title, category: document.getElementById('docCategory').value,
    notes: document.getElementById('docNotes').value.trim(),
    fileName, mimeType: state.formDocFile.type, size: state.formDocFile.size,
    blob: state.formDocFile, created: Date.now()
  };
  await dbPut('documents', doc);
  closeModal();
  toast('Asiakirja lisätty');
  render();
}

  if (!confirm('Poistetaanko laite? Sen päiväkirjamerkinnät ja huoltokohteet säilyvät mutta menettävät yhteyden laitteeseen.')) return;
  // Nollaa viittaukset
  const items = await dbWhere('maintenanceItems', 'deviceId', id);
  for (const it of items) { it.deviceId = null; await dbPut('maintenanceItems', it); }
  const docs = await dbWhere('documents', 'deviceId', id);
  for (const d of docs) { d.deviceId = null; await dbPut('documents', d); }
  const journals = (await dbAll('journalEntries')).filter(j => j.deviceId === id);
  for (const j of journals) { j.deviceId = null; await dbPut('journalEntries', j); }
  await dbDel('devices', id);
  popView();
  toast('Poistettu');
}

  const entry = await dbGet('journalEntries', id);

  const linkVal = document.getElementById('jLink').value;
  if (!linkVal) { toast('Valitse mihin merkintä liittyy'); return; }
  const date = document.getElementById('jDate').value;
  if (!date) { toast('Anna päivämäärä'); return; }
  const text = document.getElementById('jText').value.trim();
  const title = document.getElementById('jTitle').value.trim();

  let spaceId = null, deviceId = null;
  if (linkVal.startsWith('space:')) spaceId = linkVal.slice(6);
  else if (linkVal.startsWith('device:')) deviceId = linkVal.slice(7);

  entry.spaceId = spaceId;
  entry.deviceId = deviceId;
  entry.date = date;
  entry.title = title;
  entry.text = text;
  entry.photos = state.formPhotos;
  await dbPut('journalEntries', entry);
  closeModal();
  toast('Tallennettu');
  render();
}

function blobToBase64(blob) {
  return new Promise(res => { const r = new FileReader(); r.onloadend = () => res(r.result); r.readAsDataURL(blob); });
}
function base64ToBlob(b64) {
  const [meta, data] = b64.split(',');
  const mime = meta.match(/:(.+);/)[1];
  const bytes = atob(data);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

async function exportData() {
  toast('Pakataan…');
  const data = { version: 4, app: 'Taloni', exported: new Date().toISOString() };
  for (const store of STORES) {
    const items = await dbAll(store);
    const processed = await Promise.all(items.map(async it => {
      const copy = { ...it };
      if (copy.blob instanceof Blob) copy.blob = await blobToBase64(copy.blob);
      if (Array.isArray(copy.photos)) copy.photos = await Promise.all(copy.photos.map(p => p instanceof Blob ? blobToBase64(p) : p));
      return copy;
    }));
    data[store] = processed;
  }
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `taloni-${today()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('Vienti valmis');
}

async function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!confirm('Korvaa kaikki nykyiset tiedot tuodulla varmuuskopiolla?')) { e.target.value = ''; return; }
  toast('Tuodaan…');
  const data = JSON.parse(await file.text());
  for (const store of STORES) await dbClear(store);
  for (const store of STORES) {
    for (const it of (data[store] || [])) {
      if (typeof it.blob === 'string') it.blob = base64ToBlob(it.blob);
      if (Array.isArray(it.photos)) it.photos = it.photos.map(p => typeof p === 'string' ? base64ToBlob(p) : p);
      await dbPut(store, it);
    }
  }
  // Jos vanhassa varmuuskopiossa ei ole luokituksia, lisää oletukset
  const taxonomiesAfter = await dbAll('taxonomies');
  if (taxonomiesAfter.length === 0) {
    for (const [type, items] of Object.entries(DEFAULT_TAXONOMIES)) {
      for (let i = 0; i < items.length; i++) {
        await dbPut('taxonomies', {
          id: uid(), type, name: items[i].name, icon: items[i].icon,
          order: i, created: Date.now()
        });
      }
    }
  }
  await refreshTaxonomyCache();
  toast('Tuotu onnistuneesti');
  e.target.value = '';
  closeModal();
  const ls = await dbGet('settings', 'lastProperty');
  if (ls) state.currentPropertyId = ls.value;
  render();
}

async function resetData() {
  if (!confirm('Tämä poistaa KAIKKI tiedot pysyvästi. Jatketaanko?')) return;
  if (!confirm('Oletko varma? Tätä ei voi perua.')) return;
  for (const store of STORES) await dbClear(store);
  // Palauta oletusluokitukset
  for (const [type, items] of Object.entries(DEFAULT_TAXONOMIES)) {
    for (let i = 0; i < items.length; i++) {
      await dbPut('taxonomies', {
        id: uid(), type, name: items[i].name, icon: items[i].icon,
        order: i, created: Date.now()
      });
    }
  }
  await refreshTaxonomyCache();
  state.currentPropertyId = null;
  clearStack();
  closeModal();
  toast('Tyhjennetty');
  render();
}

    }

    // === Päiväkirjamerkinnät ===
    const journals = [
      { deviceId: apkId, date: '2026-04-12', title: 'Pumppu jumissa',
        text: 'Astianpesukone ei lähtenyt päälle aamulla. Suodatin oli täynnä ruoantähteitä — puhdistuksen jälkeen alkoi taas toimia normaalisti.\n\nMuistutus itselle: tarkista suodatin kuukausittain!' },
      { spaceId: pihaId, date: '2025-09-22', title: 'Syyssiivous',
        text: 'Lehdet haravoitu, sadevesikaivot puhdistettu. Etupiha kuntoon talvea varten. Käytetty noin 3 tuntia.' },
      { spaceId: paaId, date: '2025-11-08', title: 'Ulko-oven tiivisteet',
        text: 'Vaihdettu eteisen ulko-oven tiivisteet, vanhat olivat lähes umpeen kuluneet. Materiaali: D-profiili EPDM, 8m K-Raudasta. Vetää huomattavasti vähemmän.' },
      { spaceId: khId, date: '2025-09-15', title: 'Vesivahingon varalta',
        text: 'Asensin vesivahdin pesukoneen veden tuloputkeen. Hälyttää ja katkaisee veden jos vuotaa.\nLaite: Aquaguard AG-1, ostettu Verkkokauppa.com (89 €).' },
      { deviceId: kiuasId, date: '2025-08-20', title: 'Kivien tarkistus',
        text: 'Tarkastin saunan kivet, alkavat mennä rikki ja jauhautua. Vaihto seuraavana kesänä.' },
      { spaceId: olohuoneId, date: '2025-12-20', title: 'Verhotanko irti',
        text: 'Iso verhotanko olohuoneessa irrotettiin pesun ajaksi. Yksi kiinnike rikki — pitää käydä Bauhausista uusi.' },
      { deviceId: pesukoneId, date: '2025-11-15', title: 'Siivilän puhdistus',
        text: 'Puhdistettu pyykinpesukoneen pumpun suodatin. Siellä oli pari kolikkoa, vyön solki ja kasa nukkaa.' },
      { spaceId: autotalliId, date: '2025-10-30', title: 'Lumitykit valmiina',
        text: 'Lumilingosta vaihdettu öljyt ja terotettu lapa. Bensaa täyteen, valmis talvea varten.' },
      { spaceId: khpId, date: '2025-08-12', title: 'Saumat ok',
        text: 'Tarkastin kylpyhuoneen silikonisaumat suihkun ympärillä. Pieni tummuma kulmassa mutta ei vuotoa. Pitää huoltaa ehkä ensi vuonna.' },
      { deviceId: maalampoId, date: '2025-09-10', title: 'Vuosihuolto tehty',
        text: 'NIBE-huolto kävi tekemässä vuosihuollon. Kaikki ok, paineet normaalit. Lasku 285 €. Pyytänyt kuitin asiakirjoihin.' }
    ];
    for (const j of journals) {
      await dbPut('journalEntries', {
        id: uid(), propertyId: propId,
        spaceId: j.spaceId || null, deviceId: j.deviceId || null,
        date: j.date, title: j.title, text: j.text,
        photos: [], created: Date.now()
      });
    }
  }

  const ls = await dbGet('settings', 'lastProperty');
  const stillExists = ls && (await dbGet('properties', ls.value));
  if (stillExists) state.currentPropertyId = ls.value;
  else {
    const props = await dbAll('properties');
    if (props.length === 1) state.currentPropertyId = props[0].id;
  }

  render();
}

// Splash-näytön käsittely + päivityksen tarkistus
async function bootApp() {
  const splash = document.getElementById('splash');
  const status = document.getElementById('splashStatus');
  const app = document.getElementById('app');
  const startTime = Date.now();

  try {
    status.textContent = 'Käynnistetään…';
    await init();

    if ('serviceWorker' in navigator) {
      status.textContent = 'Tarkistetaan päivityksiä…';
      try {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) {
          await reg.update();
          await new Promise(r => setTimeout(r, 800));
          if (reg.waiting) {
            status.textContent = 'Uusi versio saatavilla — päivitä sovellus';
            status.style.color = 'rgba(255, 255, 255, 0.95)';
          } else {
            status.textContent = `Uusin versio käytössä (${APP_VERSION})`;
          }
        } else {
          status.textContent = `Versio ${APP_VERSION}`;
        }
      } catch (e) {
        status.textContent = `Versio ${APP_VERSION}`;
      }
    } else {
      status.textContent = `Versio ${APP_VERSION}`;
    }
  } catch (err) {
    status.textContent = 'Virhe käynnistyksessä';
    alert('Virhe alustuksessa: ' + err.message);
    return;
  }

  const elapsed = Date.now() - startTime;
  const minSplashTime = 2000;
  if (elapsed < minSplashTime) {
    await new Promise(r => setTimeout(r, minSplashTime - elapsed));
  }

  app.style.opacity = '1';
  splash.classList.add('fade-out');
  document.documentElement.style.background = '';
  document.querySelector('meta[name="theme-color"]').content = '#ffffff';
  setTimeout(() => { splash.style.display = 'none'; }, 500);
}

bootApp();
</script>
