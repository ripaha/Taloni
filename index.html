<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Taloni</title>
<link rel="manifest" id="manifestLink">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%232563eb"/><path d="M50 24 L78 46 L78 78 L22 78 L22 46 Z" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  /* Light, airy palette */
  --bg: #ffffff;
  --bg-soft: #f5f7fa;
  --bg-card: #ffffff;

  --ink: #0f172a;
  --ink-soft: #64748b;
  --ink-faint: #94a3b8;

  --accent: #2563eb;        /* modern blue */
  --accent-dark: #1e40af;
  --accent-soft: #eff6ff;
  --accent-pale: #f5f9ff;

  --warm: #ea580c;          /* warm accent */
  --warm-soft: #ffedd5;

  --border: #e5e9f0;
  --border-soft: #eef2f5;

  --danger: #dc2626;
  --danger-soft: #fee2e2;
  --success: #16a34a;
  --success-soft: #dcfce7;
  --warn: #ea580c;
  --warn-soft: #ffedd5;

  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow: 0 1px 3px rgba(15, 23, 42, 0.04), 0 2px 8px rgba(15, 23, 42, 0.04);
  --shadow-lg: 0 4px 12px rgba(15, 23, 42, 0.06), 0 10px 30px rgba(15, 23, 42, 0.06);

  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior-y: none; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-soft);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

#app { max-width: 520px; margin: 0 auto; min-height: 100vh; padding-bottom: 96px; background: var(--bg-soft); }

/* --- Top bar (kevyt, ei iso hero) --- */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  padding-top: max(14px, env(safe-area-inset-top));
  background: var(--bg);
  border-bottom: 1px solid var(--border-soft);
  position: sticky; top: 0; z-index: 30;
}
.brand {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--ink);
  letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px;
}
.brand-mark {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  color: white;
  border-radius: 8px; display: flex;
  align-items: center; justify-content: center;
}
.brand-mark svg { width: 16px; height: 16px; }
.brand-version {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-faint);
  letter-spacing: 0;
  align-self: center;
  margin-left: 2px;
}

.prop-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent-soft); color: var(--accent-dark);
  padding: 7px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  border: 1px solid transparent; cursor: pointer; font-family: inherit;
  max-width: 50%;
}
.prop-pill .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prop-pill svg { width: 14px; height: 14px; flex-shrink: 0; }
.prop-pill:active { background: #dceaff; }

/* --- Back nav --- */
.back-nav {
  display: flex; align-items: center; gap: 6px;
  padding: 14px 20px 4px;
  cursor: pointer;
  color: var(--accent);
  font-size: 15px; font-weight: 500;
}
.back-nav svg { width: 20px; height: 20px; }

.content { padding: 16px 20px 20px; }

/* --- Headings --- */
.page-title {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1.2;
}
.page-subtitle {
  font-size: 14px; color: var(--ink-soft); margin-bottom: 24px;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin: 28px 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.section-title:first-child { margin-top: 0; }
.section-title .action {
  font-size: 14px; font-weight: 600; color: var(--accent);
  cursor: pointer; display: flex; align-items: center; gap: 4px;
}
.section-title .action svg { width: 16px; height: 16px; }

/* --- Stats (compact) --- */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.stat {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.stat-num {
  font-family: 'Inter', sans-serif;
  font-size: 20px; font-weight: 600; line-height: 1;
  color: var(--ink);
}
.stat-num.warn { color: var(--warn); }
.stat-num.danger { color: var(--danger); }
.stat-num.ok { color: var(--accent); }
.stat-label {
  font-size: 12px; color: var(--ink-soft);
  font-weight: 500;
}

/* --- Cards (D-style: neutral, grouped) --- */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 6px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.12s ease;
  border: 1px solid var(--border-soft);
}
.card:active { transform: scale(0.99); }

.card-row { display: flex; align-items: center; gap: 12px; }
.card-icon {
  width: 34px; height: 34px;
  background: var(--bg-soft); color: var(--ink-soft);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-icon svg { width: 17px; height: 17px; }

.card-main { flex: 1; min-width: 0; }
.card-title {
  font-weight: 600; font-size: 15px; color: var(--ink);
  word-break: break-word; line-height: 1.3;
}

.card-date {
  font-size: 12.5px;
  color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Group titles (Myöhässä, Tulossa) */
.group-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: 22px 0 10px;
  color: var(--ink-soft);
}
.group-title:first-child { margin-top: 8px; }
.group-title.urgent { color: var(--danger); }
.group-title.soon { color: var(--warn); }

/* --- Badge --- */
.badge {
  font-size: 12px; font-weight: 600;
  padding: 4px 10px; border-radius: 100px;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
}
.badge.danger { background: var(--danger-soft); color: var(--danger); }
.badge.warn { background: var(--warn-soft); color: var(--warn); }
.badge.ok { background: var(--success-soft); color: var(--success); }
.badge.neutral { background: var(--bg-soft); color: var(--ink-soft); }

/* --- Empty states --- */
.empty {
  text-align: center; padding: 40px 24px;
  color: var(--ink-soft);
}
.empty-icon-circle {
  width: 64px; height: 64px;
  background: var(--accent-pale); color: var(--accent);
  border-radius: 50%; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
}
.empty-icon-circle svg { width: 32px; height: 32px; }
.empty-title {
  font-family: 'Inter', sans-serif;
  font-size: 20px; font-weight: 600;
  color: var(--ink); margin-bottom: 6px;
}
.empty-text { font-size: 14px; max-width: 280px; margin: 0 auto; }
.empty-action { margin-top: 20px; }

/* --- FAB --- */
.fab {
  position: fixed;
  right: max(20px, calc(50% - 240px));
  bottom: calc(86px + env(safe-area-inset-bottom));
  width: 56px; height: 56px;
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  color: white;
  border: none; border-radius: 16px;
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
  cursor: pointer; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s ease;
}
.fab:active { transform: scale(0.92); }
.fab svg { width: 24px; height: 24px; }

/* --- Bottom nav --- */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-top: 1px solid var(--border-soft);
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 40;
}
.nav-inner {
  max-width: 520px; margin: 0 auto; width: 100%;
  display: grid; grid-template-columns: repeat(4, 1fr);
}
.nav-btn {
  background: none; border: none;
  padding: 12px 4px 10px;
  color: var(--ink-soft);
  font-size: 11px; font-weight: 500;
  font-family: inherit;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  cursor: pointer; position: relative;
}
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active svg { stroke-width: 2.4; }

/* --- Modal --- */
.modal {
  position: fixed; inset: 0;
  background: rgba(20, 40, 32, 0.4);
  z-index: 100;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(6px);
}
.modal.active { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-sheet {
  background: var(--bg);
  width: 100%; max-width: 520px; margin: 0 auto;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 10px 22px 28px;
  padding-bottom: calc(28px + env(safe-area-inset-bottom));
  max-height: 92vh; overflow-y: auto;
  animation: slideUp 0.25s cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-handle {
  width: 40px; height: 4px; background: var(--border); border-radius: 2px;
  margin: 0 auto 20px;
}
.modal-title {
  font-family: 'Inter', sans-serif;
  font-size: 22px; font-weight: 700;
  margin-bottom: 6px; letter-spacing: -0.02em;
}
.modal-subtitle {
  font-size: 14px; color: var(--ink-soft);
  margin-bottom: 24px;
}

/* --- Forms --- */
.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--ink); margin-bottom: 8px;
}
.field input, .field select, .field textarea {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 16px; font-family: inherit;
  background: var(--bg); color: var(--ink);
  transition: border-color 0.15s ease;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--accent);
}
.field textarea { resize: vertical; min-height: 90px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-help { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }

/* --- Buttons --- */
.btn {
  padding: 15px 22px; border: none;
  border-radius: 12px;
  font-size: 16px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: transform 0.1s ease, background 0.15s ease;
  display: inline-flex; align-items: center;
  justify-content: center; gap: 8px;
  min-height: 50px;
}
.btn:active { transform: scale(0.98); }
.btn svg { width: 18px; height: 18px; }
.btn-primary { background: var(--accent); color: white; width: 100%; }
.btn-primary:active { background: var(--accent-dark); }
.btn-secondary { background: var(--accent-soft); color: var(--accent-dark); width: 100%; }
.btn-ghost { background: transparent; color: var(--ink-soft); }
.btn-danger { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); width: 100%; }
.btn-row { display: flex; gap: 10px; margin-top: 10px; }
.btn-row .btn { flex: 1; }

/* --- List item --- */
.list-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.1s;
  min-height: 64px;
}
.list-item:active { transform: scale(0.99); }
.list-item .icon-wrap {
  width: 40px; height: 40px;
  background: var(--accent-pale); color: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.list-item .icon-wrap svg { width: 20px; height: 20px; }
.list-item .text { flex: 1; min-width: 0; }
.list-item .text .name { font-weight: 600; font-size: 15px; }
.list-item .text .sub { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
.list-item .arrow { color: var(--ink-faint); }
.list-item .arrow svg { width: 18px; height: 18px; }

/* --- Property selector hero (only on property picker) --- */
.property-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.12s;
  position: relative;
  overflow: hidden;
  border: 1.5px solid transparent;
}
.property-card:active { transform: scale(0.99); }
.property-card::before {
  content: ''; position: absolute; right: -30px; top: -30px;
  width: 120px; height: 120px; border-radius: 50%;
  background: var(--accent-pale);
}
.property-card-content { position: relative; }
.property-card h3 {
  font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700;
  margin-bottom: 4px; color: var(--ink); letter-spacing: -0.02em;
}
.property-card .meta { font-size: 14px; color: var(--ink-soft); }

.property-add-card {
  border: 2px dashed var(--border);
  background: transparent;
  border-radius: var(--radius); padding: 24px;
  text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  color: var(--ink-soft); font-weight: 600;
}
.property-add-card:active { border-color: var(--accent); background: var(--accent-pale); }
.property-add-card svg { width: 20px; height: 20px; }

/* --- Setting row --- */
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 18px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  min-height: 60px;
}
.setting-row .label { font-weight: 500; font-size: 15px; }
.setting-row .value { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
.setting-row .arrow svg { width: 18px; height: 18px; color: var(--ink-faint); }

/* --- Toast --- */
.toast {
  position: fixed; bottom: 110px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink); color: white;
  padding: 12px 20px; border-radius: 100px;
  font-size: 14px; font-weight: 500;
  z-index: 200; opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none;
  white-space: nowrap; max-width: 92vw; text-align: center;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; }

/* --- Update banner --- */
.update-banner {
  position: fixed;
  top: max(12px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: white;
  padding: 10px 14px 10px 18px;
  border-radius: 100px;
  display: flex; align-items: center; gap: 10px;
  z-index: 300;
  box-shadow: 0 6px 20px rgba(45, 106, 79, 0.4);
  animation: slideDown 0.3s ease;
  max-width: 92vw;
}
@keyframes slideDown {
  from { transform: translate(-50%, -100%); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}
.update-banner-text { font-size: 14px; font-weight: 500; white-space: nowrap; }
.update-banner-btn {
  background: white; color: var(--accent);
  border: none; padding: 6px 14px; border-radius: 100px;
  font-weight: 700; font-size: 13px; font-family: inherit;
  cursor: pointer;
}
.update-banner-close {
  background: transparent; color: white; border: none;
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0;
}
.update-banner-close svg { width: 16px; height: 16px; }

/* --- Photo grid --- */
.photo-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;
}
.photo-thumb {
  aspect-ratio: 1; background: var(--bg-soft);
  border-radius: 10px; overflow: hidden;
  position: relative; cursor: pointer;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .remove {
  position: absolute; top: 5px; right: 5px;
  width: 24px; height: 24px;
  background: rgba(20, 20, 20, 0.7); color: white;
  border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
}
.photo-thumb .remove svg { width: 14px; height: 14px; }
.photo-add {
  aspect-ratio: 1; border: 2px dashed var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint); cursor: pointer; background: transparent;
}
.photo-add svg { width: 26px; height: 26px; }

/* --- Detail hero --- */
.detail-hero {
  background: linear-gradient(135deg, var(--accent-pale) 0%, var(--accent-soft) 100%);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 18px;
}
.detail-hero-top {
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 14px; margin-bottom: 4px;
}
.detail-hero h2 {
  font-family: 'Inter', sans-serif;
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.02em; line-height: 1.25;
  word-break: break-word;
}
.detail-hero .sub {
  font-size: 14px; color: var(--ink-soft); margin-top: 4px;
  display: flex; align-items: center; gap: 6px;
}
.detail-hero .sub svg { width: 14px; height: 14px; }

.detail-meta-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  margin-top: 18px; padding-top: 18px;
  border-top: 1px solid rgba(45, 106, 79, 0.15);
}
.detail-meta-item .label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--ink-soft);
  font-weight: 600;
}
.detail-meta-item .value {
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 600; margin-top: 3px;
  letter-spacing: -0.01em;
}

/* --- Doc card --- */
.doc-icon-wrap {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--accent-soft); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
  flex-shrink: 0; letter-spacing: 0.02em;
}
.doc-icon-wrap.pdf { background: var(--warm-soft); color: var(--warm); }
.doc-icon-wrap.img { background: var(--success-soft); color: var(--success); }
.doc-icon-wrap.file { background: var(--bg-soft); color: var(--ink-soft); }

/* --- History --- */
.history-item {
  padding: 14px 0; display: flex; gap: 14px;
  border-bottom: 1px solid var(--border-soft);
}
.history-item:last-child { border-bottom: none; }
.history-date {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: var(--ink-soft); min-width: 56px; font-weight: 500;
  text-align: right; padding-top: 2px;
  font-variant-numeric: tabular-nums;
}
.history-content { flex: 1; }
.history-content .what { font-weight: 500; margin-bottom: 3px; }
.history-content .notes { font-size: 13px; color: var(--ink-soft); }

/* --- Menu grid (Lisää-tab) --- */
.menu-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.menu-tile {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 10px;
  transition: transform 0.1s, box-shadow 0.15s;
  min-height: 110px;
  box-shadow: var(--shadow-sm);
  text-align: left;
}
.menu-tile:active { transform: scale(0.97); }
.menu-tile .icon {
  width: 40px; height: 40px;
  background: var(--accent-pale); color: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.menu-tile .icon svg { width: 22px; height: 22px; }
.menu-tile .label {
  font-family: 'Inter', sans-serif; font-weight: 600;
  font-size: 15px;
}
.menu-tile .sub { font-size: 12px; color: var(--ink-soft); }

/* --- Breadcrumbs --- */

<script>
// ============================================================
// PWA + Service Worker
// ============================================================
const APP_VERSION = '0.4.7';

const manifest = {
  name: 'Taloni', short_name: 'Taloni', description: 'Kiinteistöjen huoltokirja',
  start_url: './', display: 'standalone', orientation: 'portrait',
  background_color: '#ffffff', theme_color: '#2563eb',
  icons: [
    { src: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="42" fill="%232563eb"/><path d="M96 46 L150 88 L150 150 L42 150 L42 88 Z" fill="none" stroke="white" stroke-width="11" stroke-linejoin="round"/></svg>', sizes: '192x192', type: 'image/svg+xml', purpose: 'any' },
    { src: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="%232563eb"/><path d="M256 122 L400 234 L400 396 L112 396 L112 234 Z" fill="none" stroke="white" stroke-width="30" stroke-linejoin="round"/></svg>', sizes: '512x512', type: 'image/svg+xml', purpose: 'any' }
  ]
};
document.getElementById('manifestLink').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));

// Service Worker rekisteröinti
let swRegistration = null;
let updateAvailable = false;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      swRegistration = await navigator.serviceWorker.register('./sw.js');
      console.log('[App] Service worker rekisteröity');

      // Tarkista päivitykset heti
      swRegistration.update();

      // Tarkista päivitykset säännöllisesti taustalla (joka 30min)
      setInterval(() => swRegistration.update(), 30 * 60 * 1000);

      // Kuuntele uutta service workeria
      swRegistration.addEventListener('updatefound', () => {
        const newWorker = swRegistration.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // Uusi versio on saatavilla
            updateAvailable = true;
            showUpdateBanner();
          }
        });
      });

      // Kun service worker vaihtuu, päivitä sivu
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    } catch (err) {
      console.error('[App] Service worker virhe:', err);
    }
  });
}

function showUpdateBanner() {
  // Älä näytä jos banneri on jo näkyvissä
  if (document.getElementById('updateBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'updateBanner';
  banner.className = 'update-banner';
  banner.innerHTML = `
    <div class="update-banner-text">Uusi versio saatavilla</div>
    <button class="update-banner-btn" onclick="applyUpdate()">Päivitä</button>
    <button class="update-banner-close" onclick="document.getElementById('updateBanner').remove()">${icon('x')}</button>
  `;
  document.body.appendChild(banner);
  refreshIcons();
}

function applyUpdate() {
  if (!swRegistration || !swRegistration.waiting) {
    window.location.reload();
    return;
  }
  // Käske odottavan service workerin aktivoitumaan
  swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
  // controllerchange-tapahtuma hoitaa sivun päivityksen automaattisesti
}

// Manuaalinen päivitystarkistus
async function checkForUpdates() {
  if (!swRegistration) { toast('Service worker ei ole käytössä'); return; }
  toast('Tarkistetaan päivityksiä…');
  try {
    await swRegistration.update();
    setTimeout(() => {
      if (!updateAvailable) toast('Olet jo uusimmassa versiossa');
    }, 1500);
  } catch (err) {
    toast('Tarkistus epäonnistui');
  }
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
async function installApp() {
  if (!deferredPrompt) { toast('Asennus ei juuri nyt mahdollinen'); return; }
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  if (outcome === 'accepted') toast('Asennettu kotinäytölle');
}

// ============================================================
// IndexedDB
// ============================================================
const DB_NAME = 'taloni';
const DB_VERSION = 1;
let db = null;

const STORES = ['properties', 'spaces', 'devices', 'maintenanceItems', 'maintenanceLogs',
                'journalEntries', 'projects', 'documents', 'contacts', 'meters', 'meterReadings', 'settings'];

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('properties')) db.createObjectStore('properties', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('spaces')) {
        const s = db.createObjectStore('spaces', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('parentId', 'parentId');
      }
      if (!db.objectStoreNames.contains('devices')) {
        const s = db.createObjectStore('devices', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('spaceId', 'spaceId');
      }
      if (!db.objectStoreNames.contains('maintenanceItems')) {
        const s = db.createObjectStore('maintenanceItems', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('spaceId', 'spaceId');
        s.createIndex('deviceId', 'deviceId'); s.createIndex('nextDate', 'nextDate');
      }
      if (!db.objectStoreNames.contains('maintenanceLogs')) {
        const s = db.createObjectStore('maintenanceLogs', { keyPath: 'id' });
        s.createIndex('itemId', 'itemId'); s.createIndex('deviceId', 'deviceId');
      }
      if (!db.objectStoreNames.contains('journalEntries')) {
        const s = db.createObjectStore('journalEntries', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('spaceId', 'spaceId');
        s.createIndex('projectId', 'projectId');
      }
      if (!db.objectStoreNames.contains('projects')) {
        const s = db.createObjectStore('projects', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId');
      }
      if (!db.objectStoreNames.contains('documents')) {
        const s = db.createObjectStore('documents', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId'); s.createIndex('spaceId', 'spaceId');
        s.createIndex('deviceId', 'deviceId');
      }
      if (!db.objectStoreNames.contains('contacts')) {
        const s = db.createObjectStore('contacts', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId');
      }
      if (!db.objectStoreNames.contains('meters')) {
        const s = db.createObjectStore('meters', { keyPath: 'id' });
        s.createIndex('propertyId', 'propertyId');
      }
      if (!db.objectStoreNames.contains('meterReadings')) {
        const s = db.createObjectStore('meterReadings', { keyPath: 'id' });
        s.createIndex('meterId', 'meterId');
      }
      if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const tx = (s, m='readonly') => db.transaction(s, m).objectStore(s);
const dbPut = (s, o) => new Promise((r, j) => { o.updated = Date.now(); const x = tx(s,'readwrite').put(o); x.onsuccess = () => r(o); x.onerror = () => j(x.error); });
const dbGet = (s, k) => new Promise((r, j) => { const x = tx(s).get(k); x.onsuccess = () => r(x.result); x.onerror = () => j(x.error); });
const dbAll = (s) => new Promise((r, j) => { const x = tx(s).getAll(); x.onsuccess = () => r(x.result); x.onerror = () => j(x.error); });
const dbDel = (s, k) => new Promise((r, j) => { const x = tx(s,'readwrite').delete(k); x.onsuccess = () => r(); x.onerror = () => j(x.error); });
const dbClear = (s) => new Promise((r, j) => { const x = tx(s,'readwrite').clear(); x.onsuccess = () => r(); x.onerror = () => j(x.error); });
async function dbWhere(store, indexName, value) {
  return new Promise((res, rej) => {
    const r = tx(store).index(indexName).getAll(value);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}

// ============================================================
// Apurit
// ============================================================
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const today = () => new Date().toISOString().slice(0, 10);
const fmtDate = iso => !iso ? '–' : new Date(iso).toLocaleDateString('fi-FI', { day: 'numeric', month: 'short', year: 'numeric' });
const fmtDateShort = iso => !iso ? '–' : new Date(iso).toLocaleDateString('fi-FI', { day: 'numeric', month: 'numeric' });
const fmtSize = b => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' kB' : (b/1048576).toFixed(1) + ' MB';
function daysUntil(iso) {
  if (!iso) return null;
  const d = new Date(iso); d.setHours(0,0,0,0);
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}
function calcNextDate(lastDate, interval, unit) {
  if (!lastDate || !interval) return null;
  const d = new Date(lastDate);
  if (unit === 'days') d.setDate(d.getDate() + Number(interval));
  if (unit === 'months') d.setMonth(d.getMonth() + Number(interval));
  if (unit === 'years') d.setFullYear(d.getFullYear() + Number(interval));
  return d.toISOString().slice(0, 10);
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
const escapeHtml = s => s == null ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function compressImage(file, maxWidth = 1600, quality = 0.82) {
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => {
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale; canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Lucide ikonit kategorioille ja tilatyypeille

  'LVI': 'droplets',
  'Sähkö': 'zap',
  'Lämmitys': 'flame',
  'Piha': 'trees',
  'Julkisivu': 'home',
  'Sisätilat': 'sofa',
  'Laitteet': 'box',
  'Muu': 'wrench'
};
const SPACE_TYPE_ICON = {
  'rakennus': 'home',
  'huone': 'door-open',
  'keittiö': 'utensils',
  'kylpyhuone': 'bath',
  'sauna': 'flame',
  'autotalli': 'car',
  'varasto': 'package',
  'piha': 'trees',
  'terassi': 'sun',
  'muu': 'square'
};
const SPACE_TYPES = ['rakennus','huone','keittiö','kylpyhuone','sauna','autotalli','varasto','piha','terassi','muu'];
const PROPERTY_TYPES = ['Omakotitalo','Loma-asunto','Kerrostalo','Rivitalo','Muu'];

// Pieni apuri Lucide-ikonin renderöimiseen HTML-merkkijonona
function icon(name, size) {
  // Käytetään data-lucide ja kutsutaan lucide.createIcons() renderin jälkeen
  return `<i data-lucide="${name}"${size ? ` style="width:${size}px;height:${size}px"` : ''}></i>`;
}
function refreshIcons() {
  if (window.lucide) lucide.createIcons();
}

// ============================================================
// Tila ja reititys
// ============================================================
let state = {
  currentPropertyId: null,
  currentTab: 'home',
  stack: [],
  formPhotos: [],
  formDocFile: null,
};

function pushView(view) { state.stack.push(view); render(); }
function popView() { state.stack.pop(); render(); }
function clearStack() { state.stack = []; }

// ============================================================
// Render
// ============================================================
async function render() {
  await renderTopbar();
  await renderBackNav();
  await renderNav();
  await renderContent();
  refreshIcons();
}

async function renderTopbar() {
  const el = document.getElementById('topbar');
  const properties = await dbAll('properties');
  const current = state.currentPropertyId ? properties.find(p => p.id === state.currentPropertyId) : null;

  el.innerHTML = `
    <div class="brand">
      <div class="brand-mark">${icon('home')}</div>
      <span>Taloni</span>
      <span class="brand-version">v${APP_VERSION}</span>
    </div>
    ${current ? `
      <button class="prop-pill" onclick="openPropertyPicker()">
        <span class="name">${escapeHtml(current.name)}</span>
        ${properties.length > 1 ? icon('chevrons-up-down') : ''}
      </button>
    ` : ''}`;
}

async function renderBackNav() {
  const el = document.getElementById('backNav');
  if (state.stack.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="back-nav" onclick="popView()">${icon('arrow-left')}Takaisin</div>`;
}

async function renderNav() {
  const nav = document.getElementById('nav');
  if (!state.currentPropertyId) { nav.innerHTML = ''; return; }
  const tabs = [
    { id: 'home', label: 'Etusivu', icon: 'house' },
    { id: 'spaces', label: 'Tilat', icon: 'layout-grid' },
    { id: 'journal', label: 'Päiväkirja', icon: 'book-open' },
    { id: 'more', label: 'Lisää', icon: 'menu' }
  ];
  nav.innerHTML = `<div class="nav-inner">${tabs.map(t => `
    <button class="nav-btn ${state.currentTab === t.id && state.stack.length === 0 ? 'active' : ''}" onclick="switchTab('${t.id}')">
      ${icon(t.icon)}<span>${t.label}</span>
    </button>`).join('')}</div>`;
}

function switchTab(tab) {
  state.currentTab = tab;
  clearStack();
  render();
}

async function renderContent() {
  document.getElementById('fab').style.display = 'none';
  if (!state.currentPropertyId) return renderPropertyPicker();
  if (state.stack.length > 0) {
    const top = state.stack[state.stack.length - 1];
    if (top.view === 'space') return renderSpaceView(top.id);
    if (top.view === 'maintenanceList') return renderMaintenanceList();
    if (top.view === 'documentsList') return renderDocumentsList();
    if (top.view === 'devicesList') return renderDevicesList();
    if (top.view === 'contactsList') return renderContactsList();
    if (top.view === 'maintenanceItem') return renderMaintenanceItemDetail(top.id);
    if (top.view === 'device') return renderDeviceDetail(top.id);
    if (top.view === 'document') return renderDocumentDetail(top.id);
  }
  if (state.currentTab === 'home') return renderHome();
  if (state.currentTab === 'spaces') return renderSpaces();
  if (state.currentTab === 'journal') return renderJournal();
  if (state.currentTab === 'more') return renderMore();
}

// ============================================================
// Kiinteistöt
// ============================================================
async function renderPropertyPicker() {
  const c = document.getElementById('content');
  const properties = await dbAll('properties');
  c.innerHTML = `
    <h1 class="page-title">${properties.length === 0 ? 'Tervetuloa' : 'Kiinteistöt'}</h1>
    <p class="page-subtitle">${properties.length === 0 ? 'Lisää ensimmäinen kiinteistösi aloittaaksesi' : 'Valitse kiinteistö'}</p>
    ${properties.map(p => `
      <div class="property-card" onclick="selectProperty('${p.id}')">
        <div class="property-card-content">
          <h3>${escapeHtml(p.name)}</h3>
          <div class="meta">${escapeHtml(p.address || p.type || '')}</div>
        </div>
      </div>
    `).join('')}
    <div class="property-add-card" onclick="openAddPropertyModal()">
      ${icon('plus')}<span>Lisää kiinteistö</span>
    </div>`;
}

function openPropertyPicker() {
  state.currentPropertyId = null;
  clearStack();
  render();
}

async function selectProperty(id) {
  state.currentPropertyId = id;
  state.currentTab = 'home';
  clearStack();
  await dbPut('settings', { key: 'lastProperty', value: id });
  render();
}

// ============================================================
// Etusivu
// ============================================================
async function renderHome() {
  const c = document.getElementById('content');
  const property = await dbGet('properties', state.currentPropertyId);
  const items = await dbWhere('maintenanceItems', 'propertyId', state.currentPropertyId);
  items.sort((a, b) => !a.nextDate ? 1 : !b.nextDate ? -1 : a.nextDate.localeCompare(b.nextDate));

  const overdue = items.filter(i => { const d = daysUntil(i.nextDate); return d !== null && d < 0; });
  const soon = items.filter(i => { const d = daysUntil(i.nextDate); return d !== null && d >= 0 && d <= 30; });
  const projects = (await dbWhere('projects', 'propertyId', state.currentPropertyId)).filter(p => p.status === 'käynnissä');

  document.getElementById('fab').style.display = 'flex';

  c.innerHTML = `
    <h1 class="page-title">${escapeHtml(property.name)}</h1>
    <p class="page-subtitle">${escapeHtml(property.address || property.type || '')}</p>

    ${(overdue.length + soon.length) > 0 ? `
      ${overdue.length > 0 ? `
        <div class="group-title urgent">Myöhässä</div>
        ${overdue.map(it => renderMaintenanceCard(it)).join('')}
      ` : ''}
      ${soon.length > 0 ? `
        <div class="group-title soon">Tulossa</div>
        ${soon.map(it => renderMaintenanceCard(it)).join('')}
      ` : ''}
    ` : items.length > 0 ? `
      <div class="empty">
        <div class="empty-icon-circle">${icon('check')}</div>
        <div class="empty-title">Kaikki ajan tasalla</div>
        <div class="empty-text">Seuraavat huollot kaukana tulevaisuudessa</div>
      </div>
    ` : `
      <div class="empty">
        <div class="empty-icon-circle">${icon('sparkles')}</div>
        <div class="empty-title">Aloitetaan!</div>
        <div class="empty-text">Lisää ensimmäinen huoltokohde tai tila</div>
      </div>
    `}

    ${projects.length > 0 ? `
      <div class="section-title">Käynnissä</div>
      ${projects.map(p => `
        <div class="card" onclick="toast('Projektit tulossa v0.5')">
          <div class="card-row">
            <div class="card-icon warm">${icon('hammer')}</div>
            <div class="card-main">
              <div class="card-title">${escapeHtml(p.title)}</div>
              <div class="card-meta"><span>Aloitettu ${fmtDate(p.startDate)}</span></div>
            </div>
          </div>
        </div>
      `).join('')}
    ` : ''}
  `;
}

function renderMaintenanceCard(item, withAction = false) {
  const days = daysUntil(item.nextDate);
  let dateInfo = '';
  if (days !== null) {
    if (days < 0) dateInfo = `${Math.abs(days)} pv · ${fmtDateShort(item.nextDate)}`;
    else dateInfo = `${days} pv · ${fmtDateShort(item.nextDate)}`;
  }
  return `<div class="card" onclick="pushView({view:'maintenanceItem', id:'${item.id}'})">
    <div class="card-row">
      <div class="card-icon">${icon(CATEGORY_ICON[item.category] || 'wrench')}</div>
      <div class="card-main">
        <div class="card-title">${escapeHtml(item.name)}</div>
      </div>
      ${dateInfo ? `<div class="card-date">${dateInfo}</div>` : ''}
    </div>
  </div>`;
}

// ============================================================
// Tilat
// ============================================================
async function renderSpaces() {
  const c = document.getElementById('content');
  const spaces = await dbWhere('spaces', 'propertyId', state.currentPropertyId);
  const rootSpaces = spaces.filter(s => !s.parentId);
  document.getElementById('fab').style.display = 'flex';

  if (rootSpaces.length === 0) {
    c.innerHTML = `
      <h1 class="page-title">Tilat</h1>
      <div class="empty">
        <div class="empty-icon-circle">${icon('layout-grid')}</div>
        <div class="empty-title">Ei tiloja</div>
        <div class="empty-text">Lisää piha, päärakennus, sauna, autotalli...</div>
        <div class="empty-action"><button class="btn btn-primary" onclick="openAddSpaceModal(null)" style="max-width: 280px; margin: 0 auto;">${icon('plus')}Lisää ensimmäinen tila</button></div>
      </div>`;
    return;
  }

  c.innerHTML = `
    <h1 class="page-title">Tilat</h1>
    <p class="page-subtitle">${rootSpaces.length} tilaa</p>
    ${rootSpaces.map(s => renderSpaceListItem(s, spaces)).join('')}
  `;
}

function renderSpaceListItem(space, allSpaces) {
  const children = allSpaces.filter(s => s.parentId === space.id);
  return `<div class="list-item" onclick="pushView({view:'space', id:'${space.id}'})">
    <div class="icon-wrap">${icon(SPACE_TYPE_ICON[space.type] || 'square')}</div>
    <div class="text">
      <div class="name">${escapeHtml(space.name)}</div>
      <div class="sub">${space.type || 'tila'}${children.length > 0 ? ` · ${children.length} alatilaa` : ''}</div>
    </div>
    <div class="arrow">${icon('chevron-right')}</div>
  </div>`;
}

// ============================================================
// Tilan näkymä
// ============================================================
async function renderSpaceView(spaceId) {
  const c = document.getElementById('content');
  const space = await dbGet('spaces', spaceId);
  if (!space) { popView(); return; }

  const allSpaces = await dbWhere('spaces', 'propertyId', state.currentPropertyId);
  const children = allSpaces.filter(s => s.parentId === spaceId);
  const devices = await dbWhere('devices', 'spaceId', spaceId);
  const items = await dbWhere('maintenanceItems', 'spaceId', spaceId);
  const docs = await dbWhere('documents', 'spaceId', spaceId);
  const journals = await dbWhere('journalEntries', 'spaceId', spaceId);
  const breadcrumbs = await buildBreadcrumbs(space);

  document.getElementById('fab').style.display = 'flex';

  c.innerHTML = `
    <div class="breadcrumbs">
      ${breadcrumbs.slice(0, -1).map(b => `<span>${b}</span>${icon('chevron-right')}`).join('')}
      <span class="current">${breadcrumbs[breadcrumbs.length-1]}</span>
    </div>

    <div class="detail-hero">
      <div class="detail-hero-top">
        <div>
          <h2>${escapeHtml(space.name)}</h2>
          <div class="sub">${icon(SPACE_TYPE_ICON[space.type] || 'square')}<span>${escapeHtml(space.type || 'tila')}</span></div>
        </div>
      </div>
      ${space.notes ? `<div style="margin-top: 14px; font-size: 14px;">${escapeHtml(space.notes)}</div>` : ''}
    </div>

async function buildBreadcrumbs(space) {
  const property = await dbGet('properties', space.propertyId);
  const crumbs = [escapeHtml(property?.name || 'Kiinteistö')];
  let current = space;
  const chain = [];
  while (current.parentId) {
    const parent = await dbGet('spaces', current.parentId);
    if (!parent) break;
    chain.unshift(parent);
    current = parent;
  }
  chain.forEach(s => crumbs.push(escapeHtml(s.name)));
  crumbs.push(escapeHtml(space.name));
  return crumbs;
}

async function openDoc(id) {
  const d = await dbGet('documents', id);
  window.open(URL.createObjectURL(d.blob), '_blank');
}
async function downloadDoc(id) {
  const d = await dbGet('documents', id);
  const url = URL.createObjectURL(d.blob);
  const a = document.createElement('a');
  a.href = url; a.download = d.fileName || 'tiedosto'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
async function deleteDoc(id) {
  if (!confirm('Poistetaanko asiakirja?')) return;
  await dbDel('documents', id);
  popView();
  toast('Poistettu');
}

async function deleteProperty(id) {
  if (!confirm('Poistetaanko kiinteistö ja KAIKKI siihen liittyvä data?')) return;
  if (!confirm('Oletko varma? Tätä ei voi perua.')) return;
  for (const store of ['spaces', 'devices', 'maintenanceItems', 'journalEntries', 'projects', 'documents', 'contacts', 'meters']) {
    const items = await dbWhere(store, 'propertyId', id);
    for (const it of items) await dbDel(store, it.id);

  await dbDel('properties', id);

  state.currentPropertyId = null;
  clearStack();
  render();
}

async function deleteSpace(id) {
  if (!confirm('Poistetaanko tila? Alatilat poistuvat myös. Tiloihin liitetyt huollot/asiakirjat säilyvät mutta menettävät tilan.')) return;
  const allSpaces = await dbWhere('spaces', 'propertyId', state.currentPropertyId);
  const toDelete = [id];
  let i = 0;
  while (i < toDelete.length) {
    const children = allSpaces.filter(s => s.parentId === toDelete[i]);
    children.forEach(c => toDelete.push(c.id));
    i++;
  }
  for (const sid of toDelete) {
    for (const store of ['devices', 'maintenanceItems', 'journalEntries', 'documents']) {
      const items = await dbWhere(store, 'spaceId', sid);
      for (const it of items) { it.spaceId = null; await dbPut(store, it); }

    <p style="font-size: 13px; color: var(--ink-soft); margin-top: 8px; line-height: 1.5;">Voit tallentaa varmuuskopion Google Driveen manuaalisesti.</p>

    <div class="section-title">Vaaravyöhyke</div>
    <button class="btn btn-danger" onclick="resetData()">${icon('trash-2')}Tyhjennä kaikki tiedot</button>

    <div class="btn-row" style="margin-top: 24px;">
      <button class="btn btn-ghost" onclick="closeModal()">Sulje</button>
    </div>`);
}

function blobToBase64(blob) {
  return new Promise(res => { const r = new FileReader(); r.onloadend = () => res(r.result); r.readAsDataURL(blob); });
}
function base64ToBlob(b64) {
  const [meta, data] = b64.split(',');
  const mime = meta.match(/:(.+);/)[1];
  const bytes = atob(data);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

async function exportData() {
  toast('Pakataan…');
  const data = { version: 4, app: 'Taloni', exported: new Date().toISOString() };
  for (const store of STORES) {
    const items = await dbAll(store);
    const processed = await Promise.all(items.map(async it => {
      const copy = { ...it };
      if (copy.blob instanceof Blob) copy.blob = await blobToBase64(copy.blob);
      if (Array.isArray(copy.photos)) copy.photos = await Promise.all(copy.photos.map(p => p instanceof Blob ? blobToBase64(p) : p));
      return copy;
    }));
    data[store] = processed;
  }
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `taloni-${today()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('Vienti valmis');
}

async function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!confirm('Korvaa kaikki nykyiset tiedot tuodulla varmuuskopiolla?')) { e.target.value = ''; return; }
  toast('Tuodaan…');
  const data = JSON.parse(await file.text());
  for (const store of STORES) await dbClear(store);
  for (const store of STORES) {
    for (const it of (data[store] || [])) {
      if (typeof it.blob === 'string') it.blob = base64ToBlob(it.blob);
      if (Array.isArray(it.photos)) it.photos = it.photos.map(p => typeof p === 'string' ? base64ToBlob(p) : p);
      await dbPut(store, it);
    }
  }
  toast('Tuotu onnistuneesti');
  e.target.value = '';
  closeModal();
  const ls = await dbGet('settings', 'lastProperty');
  if (ls) state.currentPropertyId = ls.value;
  render();
}

async function resetData() {
  if (!confirm('Tämä poistaa KAIKKI tiedot pysyvästi. Jatketaanko?')) return;
  if (!confirm('Oletko varma? Tätä ei voi perua.')) return;
  for (const store of STORES) await dbClear(store);
  state.currentPropertyId = null;
  clearStack();
  closeModal();
  toast('Tyhjennetty');
  render();
}

        created: Date.now()
      });

  const ls = await dbGet('settings', 'lastProperty');
  const stillExists = ls && (await dbGet('properties', ls.value));
